<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PromptForge — AI Prompt Optimizer{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080a0f;
            --bg2: #0d1117;
            --surface: #111827;
            --border: #1f2937;
            --accent: #00e5ff;
            --accent2: #7c3aed;
            --accent3: #f59e0b;
            --text: #e2e8f0;
            --muted: #6b7280;
            --green: #10b981;
            --red: #ef4444;
            --glow: 0 0 20px rgba(0, 229, 255, 0.3);
            --font-mono: 'Space Mono', monospace;
            --font-display: 'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-display);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Glow orb */
        body::after {
            content: '';
            position: fixed;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .logo-text { color: var(--text); }
        .logo-text span { color: var(--accent); }

        .nav-links { display: flex; gap: 2rem; align-items: center; }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active { color: var(--accent); }

        .main {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: border-color 0.2s;
        }

        .card:hover { border-color: rgba(0, 229, 255, 0.2); }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #0099cc);
            color: #000;
            box-shadow: 0 0 20px rgba(0,229,255,0.25);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 30px rgba(0,229,255,0.4);
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }

        .btn-secondary:hover { background: #374151; }

        .btn-danger {
            background: rgba(239,68,68,0.15);
            color: var(--red);
            border: 1px solid rgba(239,68,68,0.3);
        }

        .btn-danger:hover { background: rgba(239,68,68,0.25); }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        textarea, input[type="text"], input[type="password"] {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-display);
            font-size: 0.95rem;
            border-radius: 8px;
            padding: 0.875rem 1rem;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        textarea:focus, input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
        }

        textarea { resize: vertical; line-height: 1.6; }

        .tag {
            display: inline-block;
            background: rgba(124,58,237,0.15);
            border: 1px solid rgba(124,58,237,0.3);
            color: #a78bfa;
            font-size: 0.7rem;
            font-family: var(--font-mono);
            letter-spacing: 0.05em;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .flash {
            padding: 1rem 1.25rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            border-left: 3px solid;
        }

        .flash-success { background: rgba(16,185,129,0.1); border-color: var(--green); color: #6ee7b7; }
        .flash-error { background: rgba(239,68,68,0.1); border-color: var(--red); color: #fca5a5; }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.4s ease forwards; }

        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            color: var(--muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 4rem;
            font-family: var(--font-mono);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="logo">
                <div class="logo-icon">⚡</div>
                <div class="logo-text">Prompt<span>Forge</span></div>
            </a>
            <div class="nav-links">
                <a href="/" class="{% block nav_home %}{% endblock %}">Optimize</a>
                <a href="/history/" class="{% block nav_history %}{% endblock %}">History</a>
            </div>
        </div>
    </nav>

    <div class="main">
        {% block content %}{% endblock %}
    </div>

    <footer>
        &lt;/&gt; PromptForge — AI Prompt Optimizer &nbsp;|&nbsp; Built with Django
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
